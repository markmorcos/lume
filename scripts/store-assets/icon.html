<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><link rel="stylesheet" href="./shared.css" />
<style>
  html, body { width: 1024px; height: 1024px; }
  .icon {
    width: 1024px; height: 1024px; position: relative; overflow: hidden;
    background:
      radial-gradient(70% 70% at 50% 30%, rgba(124,92,255,0.30), transparent 62%),
      var(--ink);
    display: flex; align-items: center; justify-content: center;
  }
  .mark { position: relative; width: 560px; height: 620px; }
  .mark .l {
    position: absolute; left: 50%; top: 52%; transform: translate(-50%,-50%);
    font-family: 'Bodoni Moda', serif; font-weight: 600; font-size: 760px;
    color: var(--paper); line-height: 1;
  }
  /* acute accent — the É of LUMÉ, a spark of light */
  .mark .acute {
    position: absolute; right: 36px; top: 36px;
    width: 150px; height: 40px; border-radius: 24px;
    background: var(--accent); transform: rotate(-32deg);
    box-shadow: 0 0 70px rgba(124,92,255,0.7);
  }
</style>
</head>
<body>
  <div class="icon" id="canvas">
    <div class="mark">
      <div class="l">L</div>
      <div class="acute"></div>
    </div>
  </div>
</body>
</html>
