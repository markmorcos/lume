name: Dashboard

# Deploys the static build dashboard to gh-pages. The page fetches the repo's
# GitHub Releases live on every load (same as the shared build-tooling
# dashboard), so it only needs redeploying when the dashboard files change —
# not per build.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - ".github/workflows/dashboard.yml"

permissions:
  contents: write

# Serialize gh-pages deploys — overlapping force-pushes spawn concurrent Pages
# builds that cancel each other into an errored state.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ./dashboard
          publish_branch: gh-pages
          force_orphan: true
