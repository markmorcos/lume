name: Build Android

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Env profile (release tag + artifact name)
        required: true
        default: production
        type: choice
        options: [development, preview, production]
      artifact-type:
        description: 'Output: apk (sideload), aab (Play Console), or both'
        required: true
        default: apk
        type: choice
        options: [apk, aab, both]

jobs:
  build:
    uses: markmorcos/build-tooling/.github/workflows/build-android.yml@v1
    permissions:
      contents: write
    with:
      app-slug: lume
      profile: ${{ inputs.profile }}
      artifact-type: ${{ inputs.artifact-type }}
    # LUMÉ has no backend (scoring is 100% on-device), but the shared
    # workflow requires EXPO_PUBLIC_SUPABASE_* to be non-empty. They're set
    # to placeholder repo secrets and never read at runtime; inherit passes
    # them through.
    secrets: inherit
